name: campusiq
description: Smart academic companion for Ghanaian university students
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP and connectivity
  http: ^1.2.0
  connectivity_plus: ^6.0.3

  # Local storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Navigation
  go_router: ^14.2.0

  # UI utilities
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.8
  flutter_animate: ^4.5.0
  intl: ^0.19.0

  # PDF text extraction (offline, no API key)
  syncfusion_flutter_pdf: ^26.2.14

  # File picking and opening
  file_picker: ^8.1.2
  open_filex: ^4.4.1
  image_picker: ^1.1.2

  # External links
  url_launcher: ^6.2.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0
  workmanager: ^0.9.0
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2
  firebase_analytics: ^12.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.14.4
  # custom_lint and riverpod_lint removed: incompatible with isar_generator's analyzer constraint

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: "assets/Uni Mate logo 22.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/Uni Mate logo 22.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/Uni Mate logo 22.png
    - assets/alternate logo clearer.png
    - assets/images/
    - assets/images/universities/
