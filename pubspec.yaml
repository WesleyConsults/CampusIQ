name: campusiq
description: Smart Academic Planning & Performance System for Ghanaian University Students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP and Environment
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.3

  # Local storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Navigation
  go_router: ^14.2.0

  # UI utilities
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0

  # Markdown + math rendering for AI chat
  flutter_markdown: ^0.7.3
  flutter_math_fork: ^0.7.2
  markdown: ^7.2.2

  # PDF text extraction (offline, no API key)
  syncfusion_flutter_pdf: ^26.2.14

  # File picking and opening
  file_picker: ^8.1.2
  open_filex: ^4.4.1
  image_picker: ^1.1.2

  # Notifications
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0
  workmanager: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9
  # custom_lint and riverpod_lint removed: incompatible with isar_generator's analyzer constraint

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
